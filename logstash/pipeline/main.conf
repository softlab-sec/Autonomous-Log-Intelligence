input {
  beats {
    port => 5044
    host => "0.0.0.0"
  }
}

filter {
  mutate {
    add_field => {
      "received_at"   => "%{@timestamp}"
      "soc_version"   => "2.0"
    }
  }

  # ============================================================
  # AUTH LOGS  (SSH / PAM / sudo / su / useradd / cron)
  # ============================================================
  if [fields][log_type] == "auth" {
    grok {
      match => {
        "message" => "%{SYSLOGTIMESTAMP:event_time} %{HOSTNAME:reporting_host} %{DATA:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:log_message}"
      }
      overwrite => ["message"]
    }

    # --- Brute force / failed authentication ---
    if "Failed password" in [log_message] {
      mutate { add_tag => ["failed_login", "brute_force_candidate"] }
    }
    if "Invalid user" in [log_message] {
      mutate { add_tag => ["invalid_user", "recon_candidate"] }
    }
    if "authentication failure" in [log_message] {
      mutate { add_tag => ["auth_failure"] }
    }
    if "maximum authentication attempts exceeded" in [log_message] {
      mutate { add_tag => ["max_auth_attempts", "brute_force_candidate"] }
    }
    if "Connection reset by" in [log_message] or "Connection closed by authenticating user" in [log_message] {
      mutate { add_tag => ["suspicious_connection"] }
    }
    if "Disconnecting" in [log_message] and "Too many authentication failures" in [log_message] {
      mutate { add_tag => ["brute_force_confirmed"] }
    }
    if "POSSIBLE BREAK-IN ATTEMPT" in [log_message] {
      mutate { add_tag => ["break_in_attempt", "recon_candidate"] }
    }
    if "Did not receive identification string" in [log_message] {
      mutate { add_tag => ["scanner_probe", "recon_candidate"] }
    }
    if "Bad protocol version identification" in [log_message] {
      mutate { add_tag => ["scanner_probe", "recon_candidate"] }
    }
    if "no matching key exchange method" in [log_message]
       or "no matching cipher" in [log_message]
       or "Unable to negotiate" in [log_message] {
      mutate { add_tag => ["crypto_downgrade_attempt"] }
    }
    if "Received disconnect" in [log_message] and "11: " in [log_message] {
      # Client-initiated disconnects right after auth — common in spray attacks
      mutate { add_tag => ["spray_candidate"] }
    }

    # --- Successful logins ---
    if "Accepted password" in [log_message] or "Accepted publickey" in [log_message]
       or "Accepted keyboard-interactive" in [log_message] {
      mutate { add_tag => ["successful_login"] }
    }
    if "session opened for user root" in [log_message] {
      mutate { add_tag => ["root_session", "high_severity"] }
    }
    if "New session" in [log_message] {
      mutate { add_tag => ["new_session"] }
    }
    if "reverse mapping checking" in [log_message] or "POSSIBLE DNS SPOOFING" in [log_message] {
      mutate { add_tag => ["dns_anomaly", "recon_candidate"] }
    }

    # --- Privilege escalation ---
    if "sudo" in [log_message] {
      mutate { add_tag => ["privilege_event"] }
    }
    if "sudo" in [log_message] and "authentication failure" in [log_message] {
      mutate { add_tag => ["sudo_failure", "privilege_escalation_candidate"] }
    }
    if "COMMAND=" in [log_message] {
      mutate { add_tag => ["command_execution"] }
    }
    # Dangerous sudo commands
    if "COMMAND=/bin/bash" in [log_message] or "COMMAND=/bin/sh" in [log_message]
       or "COMMAND=/usr/bin/python" in [log_message] or "COMMAND=/usr/bin/perl" in [log_message]
       or "COMMAND=/usr/bin/awk" in [log_message] or "COMMAND=/usr/bin/find" in [log_message]
       or "COMMAND=/usr/bin/vim" in [log_message] or "COMMAND=/usr/bin/less" in [log_message]
       or "COMMAND=/usr/bin/more" in [log_message] or "COMMAND=/usr/bin/man" in [log_message]
       or "COMMAND=/usr/bin/tee" in [log_message] or "COMMAND=/usr/bin/dd" in [log_message] {
      mutate { add_tag => ["gtfobins_candidate", "privilege_escalation_candidate", "high_severity"] }
    }
    if "FAILED su" in [log_message] {
      mutate { add_tag => ["lateral_movement_candidate", "su_failure"] }
    }
    if "incorrect password attempts" in [log_message] {
      mutate { add_tag => ["privilege_escalation_candidate"] }
    }
    if "pam_unix" in [log_message] and "uid=0" in [log_message] {
      mutate { add_tag => ["root_activity"] }
    }
    # Capability abuse
    if "cap_net_raw" in [log_message] or "cap_sys_admin" in [log_message]
       or "cap_dac_override" in [log_message] or "cap_setuid" in [log_message] {
      mutate { add_tag => ["capability_abuse", "privilege_escalation_candidate"] }
    }

    # --- Account & persistence changes ---
    if "useradd" in [log_message] or "usermod" in [log_message]
       or "groupadd" in [log_message] or "groupmod" in [log_message] {
      mutate { add_tag => ["account_modification", "persistence_candidate"] }
    }
    if "userdel" in [log_message] or "groupdel" in [log_message] {
      mutate { add_tag => ["account_deletion", "defense_evasion_candidate"] }
    }
    if "passwd" in [log_message] and "password changed" in [log_message] {
      mutate { add_tag => ["password_change"] }
    }
    if "sudoers" in [log_message] {
      mutate { add_tag => ["sudoers_change", "persistence_candidate", "high_severity"] }
    }
    if "new SSH key" in [log_message] or "authorized_keys" in [log_message] {
      mutate { add_tag => ["ssh_key_added", "persistence_candidate"] }
    }
    if "chage" in [log_message] {
      mutate { add_tag => ["account_expiry_modified", "persistence_candidate"] }
    }
    if "visudo" in [log_message] {
      mutate { add_tag => ["sudoers_edit", "persistence_candidate", "high_severity"] }
    }

    # --- Cron ---
    if "CRON" in [log_message] or "cron" in [log_message] {
      mutate { add_tag => ["cron_activity"] }
    }
    if "crontab" in [log_message] {
      mutate { add_tag => ["cron_modification", "persistence_candidate"] }
    }

    # --- Lateral movement ---
    if "scp" in [log_message] or "sftp" in [log_message] or "rsync" in [log_message] {
      mutate { add_tag => ["file_transfer", "lateral_movement_candidate"] }
    }
    if "X11 forwarding" in [log_message] or "agent forwarding" in [log_message]
       or "port forwarding" in [log_message] or "tunnel" in [log_message] {
      mutate { add_tag => ["tunneling_candidate", "lateral_movement_candidate"] }
    }

    # --- Wiper / destruction indicators ---
    if "shred" in [log_message] or "wipe" in [log_message] or "secure-delete" in [log_message] {
      mutate { add_tag => ["data_destruction_candidate"] }
    }
  }

  # ============================================================
  # NGINX ACCESS LOGS
  # OWASP Top 10 (2021): A01–A10 coverage noted per section
  # ============================================================
  if [fields][log_type] == "nginx_access" {

    # ---------------------------------------------------------
    # A05: Security Misconfiguration — scanner / recon tooling
    # ---------------------------------------------------------
    if "sqlmap" in [message] or "Nikto" in [message] or "masscan" in [message]
       or "nmap" in [message] or "dirbuster" in [message] or "gobuster" in [message]
       or "wpscan" in [message] or "acunetix" in [message] or "nessus" in [message]
       or "nuclei" in [message] or "ffuf" in [message] or "wfuzz" in [message]
       or "ZAP" in [message] or "burpsuite" in [message] or "openvas" in [message]
       or "hydra" in [message] or "medusa" in [message] or "metasploit" in [message]
       or "python-requests" in [message] or "Go-http-client" in [message]
       or "zgrab" in [message] or "shodan" in [message] or "censys" in [message] {
      mutate { add_tag => ["scanner_detected", "web_attack", "recon_candidate"] }
    }

    # Empty / missing User-Agent (scrapers and raw exploit tools often omit it)
    if [message] =~ /" "-"$/ or [message] =~ /" ""$/ {
      mutate { add_tag => ["missing_user_agent", "recon_candidate"] }
    }

    # ---------------------------------------------------------
    # A03: Injection — SQL injection
    # ---------------------------------------------------------
    # Classic keyword injection
    if "SELECT" in [message] or "UNION" in [message] or "DROP TABLE" in [message]
       or "DROP DATABASE" in [message] or "TRUNCATE" in [message]
       or "information_schema" in [message] or "SLEEP(" in [message]
       or "BENCHMARK(" in [message] or "WAITFOR DELAY" in [message]
       or "OR 1=1" in [message] or "OR '1'='1" in [message]
       or "AND 1=1" in [message] or "AND 1=2" in [message]
       or "' OR '" in [message] or "\" OR \"" in [message] {
      mutate { add_tag => ["sqli_keyword", "sql_injection_attempt", "web_attack"] }
    }
    # Blind / time-based SQLi
    if "SLEEP(" in [message] or "BENCHMARK(" in [message]
       or "pg_sleep" in [message] or "WAITFOR DELAY" in [message]
       or "RANDOMBLOB" in [message] {
      mutate { add_tag => ["sqli_blind_time", "sql_injection_attempt", "web_attack"] }
    }
    # Error-based SQLi
    if "extractvalue(" in [message] or "updatexml(" in [message]
       or "floor(rand(" in [message] or "exp(~" in [message]
       or "polygon(" in [message] or "linestring(" in [message] {
      mutate { add_tag => ["sqli_error_based", "sql_injection_attempt", "web_attack"] }
    }
    # Out-of-band SQLi (DNS / HTTP exfil)
    if "load_file(" in [message] or "into outfile" in [message]
       or "into dumpfile" in [message] or "UTL_HTTP" in [message]
       or "UTL_FILE" in [message] or "xp_cmdshell" in [message]
       or "exec master" in [message] or "openrowset" in [message] {
      mutate { add_tag => ["sqli_oob", "sql_injection_attempt", "web_attack", "high_severity"] }
    }
    # URL-encoded SQL
    if "%27" in [message] or "%22" in [message] or "%3D" in [message]
       or "0x" in [message] or "0X" in [message] {
      mutate { add_tag => ["sqli_encoded", "sql_injection_attempt", "web_attack"] }
    }
    # NoSQL injection
    if '{"$gt"' in [message] or '{"$ne"' in [message] or '{"$where"' in [message]
       or '{"$regex"' in [message] or "%24gt" in [message] or "%24ne" in [message] {
      mutate { add_tag => ["nosql_injection_attempt", "web_attack"] }
    }

    # ---------------------------------------------------------
    # A03: Injection — Cross-site scripting (XSS)
    # ---------------------------------------------------------
    if "<script>" in [message] or "</script>" in [message]
       or "javascript:" in [message] or "vbscript:" in [message]
       or "onerror=" in [message] or "onload=" in [message]
       or "onmouseover=" in [message] or "onfocus=" in [message]
       or "onblur=" in [message] or "onclick=" in [message]
       or "alert(" in [message] or "confirm(" in [message] or "prompt(" in [message]
       or "document.cookie" in [message] or "document.write" in [message]
       or "window.location" in [message] or "eval(" in [message]
       or "%3Cscript" in [message] or "%3E" in [message]
       or "&#x3C;" in [message] or "&#60;" in [message]
       or "&#x6A;avascript" in [message] {
      mutate { add_tag => ["xss_attempt", "web_attack"] }
    }
    # DOM-based XSS markers
    if "innerHTML" in [message] or "outerHTML" in [message]
       or "document.getElementById" in [message] or "location.hash" in [message]
       or "location.search" in [message] or "location.href" in [message] {
      mutate { add_tag => ["dom_xss_candidate", "xss_attempt", "web_attack"] }
    }

    # ---------------------------------------------------------
    # A03: Injection — Command injection
    # ---------------------------------------------------------
    if ";cat " in [message] or "|cat " in [message] or "`cat " in [message]
       or "wget " in [message] or "curl " in [message]
       or "/bin/bash" in [message] or "/bin/sh" in [message]
       or "/bin/dash" in [message] or "/bin/zsh" in [message]
       or "%3Bcat" in [message] or "nc -e" in [message] or "ncat -e" in [message]
       or "bash -i" in [message] or "bash -c" in [message]
       or "sh -i" in [message] or "sh -c" in [message]
       or "cmd.exe" in [message] or "powershell" in [message]
       or "PowerShell" in [message] or "pwsh" in [message]
       or ";id;" in [message] or "|id|" in [message] or ";whoami" in [message]
       or "&&id" in [message] or "||id" in [message]
       or "$(id)" in [message] or "`id`" in [message] {
      mutate { add_tag => ["command_injection_attempt", "web_attack"] }
    }

    # ---------------------------------------------------------
    # A03: Injection — LDAP injection
    # ---------------------------------------------------------
    if "*)(" in [message] or "*()|" in [message] or "%29%28" in [message]
       or "(|(uid=" in [message] or "(objectClass=*)" in [message] {
      mutate { add_tag => ["ldap_injection_attempt", "web_attack"] }
    }

    # ---------------------------------------------------------
    # A03: Injection — XML / XPath injection & XXE
    # ---------------------------------------------------------
    if "<!ENTITY" in [message] or "SYSTEM \"file" in [message]
       or "%xxe" in [message] or "DOCTYPE" in [message]
       or "ELEMENT ANY" in [message] or "<![CDATA[" in [message]
       or "xpath" in [message] or "' or '1'='1" in [message] {
      mutate { add_tag => ["xxe_xpath_injection_attempt", "web_attack"] }
    }

    # ---------------------------------------------------------
    # A03: Injection — SSTI (Server-Side Template Injection)
    # ---------------------------------------------------------
    if "{{" in [message] or "}}" in [message] or "${" in [message]
       or "#{" in [message] or "<%" in [message] or "%>" in [message]
       or "{{7*7}}" in [message] or "${7*7}" in [message]
       or "{{config}}" in [message] or "{{self}}" in [message]
       or "__class__" in [message] or "__mro__" in [message]
       or "__subclasses__" in [message] or "__import__" in [message] {
      mutate { add_tag => ["ssti_attempt", "web_attack"] }
    }

    # ---------------------------------------------------------
    # A01: Broken Access Control — path traversal / LFI / RFI
    # ---------------------------------------------------------
    if "../" in [message] or "..%2f" in [message] or "..%2F" in [message]
       or "..%5c" in [message] or "..%5C" in [message]
       or "%252e%252e" in [message] or "..%c0%af" in [message]
       or "/etc/passwd" in [message] or "/etc/shadow" in [message]
       or "/etc/hosts" in [message] or "/etc/crontab" in [message]
       or "/proc/self" in [message] or "/proc/version" in [message]
       or "/var/log" in [message] or "/boot/grub" in [message]
       or "C:\\Windows\\System32" in [message] or "C:\\boot.ini" in [message]
       or "win.ini" in [message] or "system32" in [message] {
      mutate { add_tag => ["path_traversal_lfi_attempt", "web_attack"] }
    }
    # Remote file inclusion
    if "php://" in [message] or "data://" in [message] or "file://" in [message]
       or "expect://" in [message] or "phar://" in [message]
       or "zip://" in [message] or "glob://" in [message]
       or "input://" in [message] or "filter://" in [message]
       or "=http://" in [message] or "=https://" in [message]
       or "=ftp://" in [message] {
      mutate { add_tag => ["file_inclusion_attempt", "web_attack"] }
    }

    # ---------------------------------------------------------
    # A01: Broken Access Control — IDOR / forced browsing
    # ---------------------------------------------------------
    if [message] =~ /\/api\/v[0-9]+\/users\/[0-9]+/ {
      mutate { add_tag => ["idor_candidate", "web_attack"] }
    }
    if "/admin" in [message] or "/phpmyadmin" in [message]
       or "wp-admin" in [message] or "wp-login" in [message]
       or "/manager/html" in [message] or "shell.php" in [message]
       or "cmd.php" in [message] or "/.env" in [message]
       or "/.git" in [message] or "/.svn" in [message]
       or "/.htaccess" in [message] or "/.htpasswd" in [message]
       or "/server-status" in [message] or "/server-info" in [message]
       or "/actuator" in [message] or "/metrics" in [message]
       or "/debug" in [message] or "/console" in [message]
       or "/swagger" in [message] or "/api-docs" in [message]
       or "/graphql" in [message] or "/v1/graphql" in [message]
       or "/.DS_Store" in [message] or "/backup" in [message]
       or "/.bash_history" in [message] or "/.ssh/" in [message]
       or "config.php" in [message] or "database.yml" in [message]
       or "credentials.json" in [message] or "secrets.env" in [message]
       or "web.config" in [message] or "wp-config" in [message] {
      mutate { add_tag => ["sensitive_endpoint_probe", "web_attack"] }
    }

    # ---------------------------------------------------------
    # A02: Cryptographic Failures — sensitive data in URLs
    # ---------------------------------------------------------
    if [message] =~ /password=[^&\s]+/ or [message] =~ /passwd=[^&\s]+/
       or [message] =~ /token=[^&\s]+/ or [message] =~ /api_key=[^&\s]+/
       or [message] =~ /secret=[^&\s]+/ or [message] =~ /access_key=[^&\s]+/ {
      mutate { add_tag => ["credential_in_url", "data_exposure_candidate"] }
    }

    # ---------------------------------------------------------
    # A06: Vulnerable and Outdated Components — CVE exploit patterns
    # ---------------------------------------------------------
    # Log4Shell (CVE-2021-44228)
    if "${jndi:" in [message] or "${jndi:ldap" in [message]
       or "${jndi:dns" in [message] or "${jndi:rmi" in [message]
       or "%24%7Bjndi" in [message] or "${${::-j}${::-n}${::-d}${::-i}:" in [message]
       or "${j${::-n}di:" in [message] or "${j${lower:n}di:" in [message] {
      mutate { add_tag => ["log4shell_attempt", "cve_exploit", "web_attack", "critical_severity"] }
    }
    # Spring4Shell (CVE-2022-22965)
    if "class.module.classLoader" in [message] or "class.classLoader" in [message]
       or "spring.beanfactory" in [message] {
      mutate { add_tag => ["spring4shell_attempt", "cve_exploit", "web_attack", "high_severity"] }
    }
    # Shellshock (CVE-2014-6271)
    if "() {" in [message] and ";" in [message] {
      mutate { add_tag => ["shellshock_attempt", "cve_exploit", "web_attack", "high_severity"] }
    }
    # Heartbleed-style probe / TLS info
    if "/heartbleed" in [message] or "heartbeat" in [message] {
      mutate { add_tag => ["heartbleed_probe", "cve_exploit", "web_attack"] }
    }
    # Apache Struts / OGNL injection (CVE-2017-5638 pattern)
    if "Content-Type: multipart" in [message] and "%{" in [message] {
      mutate { add_tag => ["ognl_injection_attempt", "cve_exploit", "web_attack", "high_severity"] }
    }
    # PHP CGI argument injection (CVE-2012-1823)
    if "?-s" in [message] or "?-d+" in [message] or "?-n" in [message] {
      mutate { add_tag => ["php_cgi_injection", "cve_exploit", "web_attack"] }
    }
    # PHPUnit RCE (CVE-2017-9841)
    if "eval-stdin.php" in [message] {
      mutate { add_tag => ["phpunit_rce", "cve_exploit", "web_attack", "high_severity"] }
    }

    # ---------------------------------------------------------
    # A07: Identification & Authentication Failures
    # ---------------------------------------------------------
    if " 401 " in [message] or " 403 " in [message] {
      mutate { add_tag => ["access_denied_response"] }
    }
    # Credential stuffing / account takeover patterns
    if "/login" in [message] or "/signin" in [message] or "/auth" in [message]
       or "/oauth" in [message] or "/token" in [message] {
      mutate { add_tag => ["auth_endpoint_access"] }
    }

    # ---------------------------------------------------------
    # A08: Software and Data Integrity — deserialization attacks
    # ---------------------------------------------------------
    if "rO0AB" in [message] or "aced0005" in [message]
       or "O:8:\"stdClass\"" in [message] or "a:2:{" in [message]
       or "YToyOns" in [message] {
      # Java & PHP serialized object patterns
      mutate { add_tag => ["deserialization_attempt", "web_attack", "high_severity"] }
    }
    if "TypeNameHandling" in [message] or "__type" in [message]
       or "Json.NET" in [message] {
      mutate { add_tag => ["json_deserialization_attempt", "web_attack"] }
    }

    # ---------------------------------------------------------
    # A09: Security Logging & Monitoring Failures — log injection
    # ---------------------------------------------------------
    if "%0a" in [message] or "%0d" in [message]
       or "%0d%0a" in [message] or "\r\n" in [message]
       or "\n" in [message] {
      mutate { add_tag => ["log_injection_attempt", "web_attack"] }
    }

    # ---------------------------------------------------------
    # A10: Server-Side Request Forgery (SSRF)
    # ---------------------------------------------------------
    if "169.254.169.254" in [message]
       or "metadata.google.internal" in [message]
       or "100.100.100.200" in [message]
       or "fd00:ec2::254" in [message]
       or "127.0.0.1" in [message] or "0.0.0.0" in [message]
       or "localhost" in [message] or "::1" in [message]
       or "0x7f000001" in [message] or "2130706433" in [message]
       or "internal.example" in [message] or "/latest/meta-data" in [message]
       or "iam/security-credentials" in [message] {
      mutate { add_tag => ["ssrf_attempt", "web_attack", "high_severity"] }
    }

    # ---------------------------------------------------------
    # Open Redirect / Header Injection
    # ---------------------------------------------------------
    if "Location: http" in [message] or "Redirect: http" in [message]
       or [message] =~ /redirect=[^&\s]*(https?|\/\/)/ {
      mutate { add_tag => ["open_redirect_candidate", "web_attack"] }
    }
    if "X-Forwarded-For: " in [message] and "127.0.0.1" in [message] {
      mutate { add_tag => ["header_spoofing_candidate"] }
    }

    # ---------------------------------------------------------
    # Webshells / backdoors
    # ---------------------------------------------------------
    if "shell.php" in [message] or "cmd.php" in [message]
       or "c99.php" in [message] or "r57.php" in [message]
       or "b374k" in [message] or "wso.php" in [message]
       or "webshell" in [message] or "backdoor" in [message]
       or "passthru(" in [message] or "system(" in [message]
       or "exec(" in [message] or "shell_exec(" in [message]
       or "popen(" in [message] or "proc_open(" in [message]
       or "assert(" in [message] or "preg_replace.*\/e" in [message] {
      mutate { add_tag => ["webshell_attempt", "web_attack", "high_severity"] }
    }

    # ---------------------------------------------------------
    # Response code tagging
    # ---------------------------------------------------------
    if " 404 " in [message] {
      mutate { add_tag => ["not_found_response"] }
    }
    if " 500 " in [message] or " 502 " in [message] or " 503 " in [message] {
      mutate { add_tag => ["server_error_response"] }
    }
    if " 200 " in [message] and "web_attack" in [tags] {
      mutate { add_tag => ["possible_successful_attack"] }
    }
  }

  # ============================================================
  # SYSLOG  — OS-level events, fileless & LOLBin detection
  # ============================================================
  if [fields][log_type] == "syslog" {

    # --- Crashes / exploitation ---
    if "segfault" in [message] {
      mutate { add_tag => ["crash", "exploit_candidate"] }
    }
    if "kernel" in [message] and "DROP" in [message] {
      mutate { add_tag => ["firewall_drop_event"] }
    }
    if "Out of memory" in [message] or "oom-killer" in [message] {
      mutate { add_tag => ["resource_exhaustion", "dos_candidate"] }
    }
    if "BUG:" in [message] or "kernel BUG" in [message] or "kernel panic" in [message]
       or "RIP:" in [message] or "general protection fault" in [message] {
      mutate { add_tag => ["kernel_fault", "exploit_candidate", "high_severity"] }
    }

    # --- Persistence / tampering ---
    if "systemctl" in [message] and "enable" in [message] {
      mutate { add_tag => ["service_change", "persistence_candidate"] }
    }
    if "systemctl" in [message] and "mask" in [message] {
      mutate { add_tag => ["service_masking", "defense_evasion_candidate"] }
    }
    if "crontab" in [message] {
      mutate { add_tag => ["cron_modification", "persistence_candidate"] }
    }
    if "/etc/rc.local" in [message] or "/etc/init.d" in [message]
       or "/etc/profile.d" in [message] or "/etc/ld.so.preload" in [message]
       or "~/.bashrc" in [message] or "~/.bash_profile" in [message]
       or "~/.zshrc" in [message] or "~/.profile" in [message] {
      mutate { add_tag => ["startup_modification", "persistence_candidate"] }
    }
    if ".so" in [message] and "open" in [message] {
      mutate { add_tag => ["dynamic_library_load", "defense_evasion_candidate"] }
    }
    if "/etc/ld.so.preload" in [message] or "LD_PRELOAD" in [message] {
      mutate { add_tag => ["ld_preload_hijack", "defense_evasion_candidate", "high_severity"] }
    }

    # --- Fileless / in-memory attack techniques ---
    if "netcat" in [message] or "ncat" in [message] or "nc " in [message] {
      mutate { add_tag => ["netcat_usage", "fileless_candidate"] }
    }
    if "base64 -d" in [message] or "base64 -D" in [message]
       or "base64 --decode" in [message] {
      mutate { add_tag => ["base64_decode", "fileless_candidate"] }
    }
    if "python -c" in [message] or "python3 -c" in [message]
       or "python2 -c" in [message] {
      mutate { add_tag => ["python_oneliner", "fileless_candidate"] }
    }
    if "perl -e" in [message] or "perl -ne" in [message] {
      mutate { add_tag => ["perl_oneliner", "fileless_candidate"] }
    }
    if "ruby -e" in [message] {
      mutate { add_tag => ["ruby_oneliner", "fileless_candidate"] }
    }
    if "/dev/tcp/" in [message] or "/dev/udp/" in [message] {
      mutate { add_tag => ["bash_tcp_socket", "fileless_candidate", "reverse_shell_candidate"] }
    }
    # Reverse shell patterns
    if "bash -i >& /dev/tcp" in [message] or "0>&1" in [message]
       or "bash -i >& /dev/udp" in [message] {
      mutate { add_tag => ["reverse_shell_attempt", "fileless_candidate", "high_severity"] }
    }
    # memfd / anonymous memory execution (process injection)
    if "memfd_create" in [message] or "memfd:" in [message]
       or "/proc/self/fd" in [message] or "execveat" in [message]
       or "MFD_CLOEXEC" in [message] {
      mutate { add_tag => ["memfd_exec", "fileless_candidate", "high_severity"] }
    }
    # DDexec / process hollowing
    if "ptrace" in [message] and "POKE" in [message] {
      mutate { add_tag => ["process_injection_candidate", "fileless_candidate"] }
    }
    # Packed / encrypted dropper heuristics
    if "chmod +x" in [message] and ("/tmp/" in [message] or "/dev/shm/" in [message]) {
      mutate { add_tag => ["dropper_execution_candidate", "fileless_candidate", "high_severity"] }
    }
    if "/dev/shm/" in [message] {
      mutate { add_tag => ["shared_mem_exec_candidate", "fileless_candidate"] }
    }

    # --- Living off the Land (LOLBins) ---
    if "xterm -e" in [message] or "socat" in [message] or "nohup " in [message]
       or "screen -dm" in [message] or "tmux new" in [message] {
      mutate { add_tag => ["lolbin_candidate", "lateral_movement_candidate"] }
    }
    if "awk '{system(" in [message] or "awk 'BEGIN{system(" in [message] {
      mutate { add_tag => ["awk_exec_candidate", "lolbin_candidate"] }
    }
    if "find . -exec" in [message] or "find / -exec" in [message] {
      mutate { add_tag => ["find_exec_candidate", "lolbin_candidate"] }
    }
    if "tar --checkpoint" in [message] or "tar -cf" in [message] {
      mutate { add_tag => ["tar_exec_candidate", "lolbin_candidate"] }
    }
    if "openssl enc" in [message] or "openssl s_client" in [message] {
      mutate { add_tag => ["openssl_tunnel_candidate", "lolbin_candidate"] }
    }
    if "ssh -R" in [message] or "ssh -L" in [message] or "ssh -D" in [message] {
      mutate { add_tag => ["ssh_tunnel", "lolbin_candidate", "lateral_movement_candidate"] }
    }
    if "curl -o /tmp" in [message] or "curl -o /dev/shm" in [message]
       or "wget -O /tmp" in [message] or "wget -O /dev/shm" in [message] {
      mutate { add_tag => ["staged_dropper_download", "lolbin_candidate", "high_severity"] }
    }

    # --- Container / cloud escape ---
    if "docker exec" in [message] or "nsenter" in [message]
       or "--privileged" in [message] or "cgroup" in [message]
       or "/var/run/docker.sock" in [message]
       or "runc" in [message] and "override" in [message] {
      mutate { add_tag => ["container_escape_candidate", "high_severity"] }
    }

    # --- Credential access ---
    if "/etc/shadow" in [message] or "/etc/gshadow" in [message] {
      mutate { add_tag => ["shadow_file_access", "credential_access_candidate", "high_severity"] }
    }
    if "mimikatz" in [message] or "lazagne" in [message]
       or "secretsdump" in [message] or "hashdump" in [message]
       or "pass-the-hash" in [message] or "kerberoast" in [message]
       or "golden ticket" in [message] {
      mutate { add_tag => ["credential_tool_detected", "credential_access_candidate", "critical_severity"] }
    }

    # --- Defense evasion ---
    if "history -c" in [message] or "unset HISTFILE" in [message]
       or "HISTSIZE=0" in [message] or "HISTFILESIZE=0" in [message] {
      mutate { add_tag => ["history_cleared", "defense_evasion_candidate"] }
    }
    if "shred" in [message] or "rm -rf /var/log" in [message]
       or "> /var/log" in [message] or "truncate" in [message] {
      mutate { add_tag => ["log_tampering_candidate", "defense_evasion_candidate"] }
    }
    if "iptables -F" in [message] or "iptables -D" in [message]
       or "ufw disable" in [message] or "setenforce 0" in [message]
       or "setenforce Permissive" in [message] or "apparmor_parser -R" in [message]
       or "systemctl stop apparmor" in [message] or "systemctl stop firewalld" in [message] {
      mutate { add_tag => ["security_control_disabled", "defense_evasion_candidate", "high_severity"] }
    }
    if "chmod 777" in [message] or "chmod a+s" in [message]
       or "chmod u+s" in [message] or "chmod +s" in [message] {
      mutate { add_tag => ["suid_sgid_modification", "privilege_escalation_candidate"] }
    }

    # --- Exfiltration ---
    if "scp " in [message] and "root@" in [message] {
      mutate { add_tag => ["exfil_candidate", "high_severity"] }
    }
    if "rsync " in [message] and "::" in [message] {
      mutate { add_tag => ["exfil_candidate"] }
    }
    if "dns-sd" in [message] or "dnscat" in [message] or "iodine" in [message] {
      mutate { add_tag => ["dns_tunneling_candidate", "exfil_candidate"] }
    }
    if "icmpsh" in [message] or "ptunnel" in [message] {
      mutate { add_tag => ["icmp_tunneling_candidate", "exfil_candidate"] }
    }

    # --- Cryptomining ---
    if "xmrig" in [message] or "minerd" in [message] or "stratum+tcp" in [message]
       or "monero" in [message] or "coinhive" in [message]
       or "cpu miner" in [message] or "cryptonight" in [message] {
      mutate { add_tag => ["cryptominer_detected", "high_severity"] }
    }

    # --- Device events ---
    if "New USB device" in [message] or "usb-storage" in [message] {
      mutate { add_tag => ["usb_device_event"] }
    }
    if "sd" in [message] and "Write Protect" in [message] {
      mutate { add_tag => ["usb_write_protect_off"] }
    }
  }

  # ============================================================
  # WINDOWS EVENT LOGS (via Winlogbeat)
  # ============================================================
  if [fields][log_type] == "winlog" {
    # Pass-the-hash / token impersonation (Event 4624 with logon type 3 + NTLM)
    if "4624" in [message] and "NTLM" in [message] and "Type 3" in [message] {
      mutate { add_tag => ["pass_the_hash_candidate", "lateral_movement_candidate", "high_severity"] }
    }
    # DCSync (Event 4662 — directory service access)
    if "4662" in [message] and "1131f6aa-9c07-11d1-f79f-00c04fc2dcd2" in [message] {
      mutate { add_tag => ["dcsync_attempt", "credential_access_candidate", "critical_severity"] }
    }
    # Golden / Silver ticket (4769 — Kerberos ticket request for sensitive SPN)
    if "4769" in [message] and "0x17" in [message] {
      mutate { add_tag => ["kerberoasting_candidate", "credential_access_candidate"] }
    }
    # Malicious PowerShell (4103/4104)
    if "4103" in [message] or "4104" in [message] {
      mutate { add_tag => ["powershell_logging"] }
    }
    if "EncodedCommand" in [message] or "FromBase64String" in [message]
       or "IEX" in [message] or "Invoke-Expression" in [message]
       or "Invoke-Mimikatz" in [message] or "Invoke-ReflectivePEInjection" in [message]
       or "DownloadString" in [message] or "DownloadFile" in [message]
       or "Net.WebClient" in [message] or "Invoke-Shellcode" in [message] {
      mutate { add_tag => ["malicious_powershell", "fileless_candidate", "high_severity"] }
    }
    # WMI persistence / lateral movement (4688 process create)
    if "wmic" in [message] or "WmiPrvSE.exe" in [message]
       or "Win32_Process" in [message] and "Create" in [message] {
      mutate { add_tag => ["wmi_execution", "lateral_movement_candidate"] }
    }
    # LSASS access (4656 / 4663)
    if "lsass.exe" in [message] and ("4656" in [message] or "4663" in [message]) {
      mutate { add_tag => ["lsass_access", "credential_access_candidate", "high_severity"] }
    }
    # Volume Shadow Copy deletion (ransomware pre-step)
    if "vssadmin delete" in [message] or "wmic shadowcopy delete" in [message]
       or "bcdedit /set" in [message] and "recoveryenabled no" in [message] {
      mutate { add_tag => ["shadow_copy_deletion", "ransomware_candidate", "critical_severity"] }
    }
    # Net commands — user/group enumeration
    if "net user" in [message] or "net localgroup" in [message]
       or "net group" in [message] or "net accounts" in [message] {
      mutate { add_tag => ["ad_enumeration", "recon_candidate"] }
    }
  }

  # ============================================================
  # DNS LOGS
  # ============================================================
  if [fields][log_type] == "dns" {
    # Unusually long subdomains — DNS tunnel indicator
    if [message] =~ /\b[a-zA-Z0-9]{50,}\.[a-zA-Z0-9.-]+\b/ {
      mutate { add_tag => ["long_subdomain_dns_tunnel_candidate", "exfil_candidate"] }
    }
    # Known malware C2 TLDs
    if ".bit" in [message] or ".onion" in [message] or ".i2p" in [message]
       or ".bazar" in [message] {
      mutate { add_tag => ["suspicious_tld", "c2_candidate"] }
    }
    # Fast-flux / DGA-like patterns
    if [message] =~ /[a-z0-9]{12,}\.(xyz|top|club|gq|cf|tk|ml|ga)/ {
      mutate { add_tag => ["dga_candidate", "c2_candidate"] }
    }
    # DNS exfil via TXT records
    if "TXT" in [message] and [message] =~ /[A-Za-z0-9+\/=]{40,}/ {
      mutate { add_tag => ["dns_txt_exfil_candidate", "exfil_candidate"] }
    }
  }

  # ============================================================
  # FIREWALL / IPTABLES LOGS
  # ============================================================
  if [fields][log_type] == "firewall" {
    if "SYN" in [message] and "WINDOW=0" in [message] {
      mutate { add_tag => ["tcp_null_scan", "recon_candidate"] }
    }
    if "FLAGS=FUP" in [message] or "FLAGS=ALL" in [message] {
      mutate { add_tag => ["xmas_scan", "recon_candidate"] }
    }
    if "ICMP" in [message] and "type=8" in [message] {
      mutate { add_tag => ["icmp_ping_sweep", "recon_candidate"] }
    }
    if "DPT=23" in [message] {
      mutate { add_tag => ["telnet_access_attempt"] }
    }
    if "DPT=3389" in [message] {
      mutate { add_tag => ["rdp_access_attempt"] }
    }
    if "DPT=445" in [message] or "DPT=139" in [message] {
      mutate { add_tag => ["smb_access_attempt"] }
    }
    if "DPT=1433" in [message] or "DPT=3306" in [message]
       or "DPT=5432" in [message] or "DPT=6379" in [message]
       or "DPT=27017" in [message] {
      mutate { add_tag => ["database_port_access", "recon_candidate"] }
    }
  }

  # ============================================================
  # GLOBAL: severity roll-up — ensure no event falls through
  # ============================================================
  if "critical_severity" not in [tags] and "high_severity" not in [tags] {
    if "web_attack" in [tags] or "exploit_candidate" in [tags]
       or "c2_candidate" in [tags] or "ransomware_candidate" in [tags]
       or "fileless_candidate" in [tags] {
      mutate { add_tag => ["medium_severity"] }
    }
  }
}

output {
  file {
    path  => "/usr/share/logstash/data/events/%{[fields][log_type]}-%{+YYYY-MM-dd}.log"
    codec => json_lines
  }
  stdout {
    codec => rubydebug
  }
}